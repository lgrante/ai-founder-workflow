<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cockpit — sessions Claude Code</title>
  <style>
    :root {
      --bg: #0e1116; --panel: #161b22; --border: #283040; --fg: #e6edf3;
      --muted: #8b949e; --accent: #58a6ff; --good: #3fb950; --warn: #d29922;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg);
      font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    header { padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    .muted { color: var(--muted); }
    select, button { background: var(--panel); color: var(--fg);
      border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font: inherit; }
    button { cursor: pointer; }
    main { padding: 20px; display: grid; gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); align-items: start; }
    .col { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .col h2 { font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted); margin: 0 0 12px; }
    .card { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
    .card:last-child { margin-bottom: 0; }
    .card .title { font-weight: 600; }
    .bar { height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; margin: 8px 0 4px; }
    .bar > i { display: block; height: 100%; background: var(--good); }
    .row { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
    .tag { font-size: 11px; padding: 1px 7px; border-radius: 99px; border: 1px solid var(--border); color: var(--muted); }
    .tag.P0 { color: #ff7b72; border-color: #ff7b7244; }
    .tag.P1 { color: var(--warn); border-color: #d2992244; }
    .small { font-size: 12px; color: var(--muted); }
    .ms { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .empty { color: var(--muted); font-style: italic; }
    .err { color: #ff7b72; }
    .launch { display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      padding: 10px 20px; border-bottom: 1px solid var(--border); background: #11161d; }
    .launch input { background: var(--panel); color: var(--fg); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px; font: inherit; min-width: 160px; }
    #stream { position: fixed; right: 0; top: 0; bottom: 0; width: min(440px, 92vw);
      background: var(--panel); border-left: 1px solid var(--border); transform: translateX(100%);
      transition: transform .2s; display: flex; flex-direction: column; z-index: 10; }
    #stream.open { transform: none; }
    #stream header { border-bottom: 1px solid var(--border); }
    #log { flex: 1; overflow: auto; padding: 12px 16px; font: 13px/1.5 ui-monospace, Menlo, monospace; }
    .ev { margin-bottom: 6px; }
    .ev .k { color: var(--accent); }
    .ev.tool .k { color: var(--warn); }
    .ev.result .k { color: var(--good); }
    .ev.error .k { color: #ff7b72; }
    .pill { font-size: 11px; padding: 1px 8px; border-radius: 99px; border: 1px solid var(--border); }
    .pill.running { color: var(--warn); border-color: #d2992244; }
    .pill.done { color: var(--good); border-color: #3fb95044; }
    .pill.error { color: #ff7b72; border-color: #ff7b7244; }
  </style>
</head>
<body>
  <header>
    <h1>Cockpit <span class="muted">· sessions Claude Code</span></h1>
    <select id="repo" title="repo cible"></select>
    <button id="refresh">↻ rafraîchir</button>
    <span id="status" class="muted small"></span>
  </header>
  <div class="launch">
    <span class="small muted">Lancer&nbsp;:</span>
    <select id="type" title="type de session"></select>
    <input id="slug" placeholder="sujet / feature (slug)" />
    <button id="launch">▶ lancer</button>
    <span id="launchMsg" class="small muted"></span>
  </div>
  <main id="board"><p class="muted">chargement…</p></main>

  <aside id="stream">
    <header>
      <h1 id="streamTitle">session</h1>
      <span id="streamState" class="pill"></span>
      <button id="closeStream" style="margin-left:auto">✕</button>
    </header>
    <div id="log"></div>
  </aside>

  <script type="module">
    const $ = (s) => document.querySelector(s);
    const board = $("#board"), repoSel = $("#repo"), statusEl = $("#status");

    async function loadRepos() {
      const r = await fetch("/api/repos").then((x) => x.json()).catch(() => ({ repos: [] }));
      repoSel.innerHTML = "";
      for (const repo of r.repos ?? []) {
        const o = document.createElement("option");
        o.value = repo.path;
        o.textContent = repo.path.split("/").pop() + (repo.pilotable ? "" : " ⚠");
        repoSel.appendChild(o);
      }
      if (!repoSel.options.length) {
        const o = document.createElement("option");
        o.textContent = "(aucun repo — env COCKPIT_REPOS)";
        repoSel.appendChild(o);
      }
    }

    function pct(s) { return s.total ? Math.round((s.done / s.total) * 100) : 0; }
    function el(html) { const d = document.createElement("div"); d.innerHTML = html; return d.firstElementChild; }

    function render(b) {
      if (!b.pilotable) {
        board.innerHTML = `<p class="err">Non pilotable : ${b.reason ?? "?"}</p>`;
        return;
      }
      board.innerHTML = "";

      // BUILD
      const build = el(`<section class="col"><h2>Build · par feature</h2></section>`);
      if (!b.features.length) build.appendChild(el(`<p class="empty">aucune feature</p>`));
      for (const f of b.features) {
        const ms = f.milestones.map((m) => `<div class="ms">${m.title} — ${m.steps.done}/${m.steps.total}</div>`).join("");
        build.appendChild(el(`<div class="card">
          <div class="row"><span class="title">${f.slug}</span><span class="small">${f.steps.done}/${f.steps.total}</span></div>
          <div class="bar"><i style="width:${pct(f.steps)}%"></i></div>
          <div class="small">${pct(f.steps)}% · ${f.hasSpec ? "spec" : "—"} ${f.hasPlan ? "+ plan" : ""}</div>
          ${ms}
        </div>`));
      }
      board.appendChild(build);

      // BACKLOG
      const bl = el(`<section class="col"><h2>Backlog</h2></section>`);
      if (!b.backlog.length) bl.appendChild(el(`<p class="empty">vide</p>`));
      for (const it of b.backlog) {
        bl.appendChild(el(`<div class="card">
          <div class="row"><span class="title">${it.titre}</span><span class="tag ${it.priorite}">${it.priorite}</span></div>
          <div class="small">${it.statut} · source: ${it.source}</div>
        </div>`));
      }
      board.appendChild(bl);

      // CONTENT
      const ct = el(`<section class="col"><h2>Content · par sujet</h2></section>`);
      if (!b.content.length) ct.appendChild(el(`<p class="empty">aucun channel</p>`));
      for (const c of b.content) {
        const parts = Object.entries(c.counts).map(([s, n]) => `${s}: ${n}`).join(" · ");
        ct.appendChild(el(`<div class="card">
          <div class="title">${c.channel}</div><div class="small">${parts || "vide"}</div>
        </div>`));
      }
      board.appendChild(ct);

      // DISCOVERY
      const d = b.discovery;
      board.appendChild(el(`<section class="col"><h2>Discovery</h2>
        <div class="card small">
          marché : ${d.hasMarket ? "oui" : "non"}<br/>
          insights : ${d.hasInsights ? "oui" : "non"}<br/>
          clients support : ${d.supportClients.length}<br/>
          contacts feedback : ${d.feedbackContacts}
        </div></section>`));
    }

    async function loadBoard() {
      const repo = repoSel.value;
      statusEl.textContent = "lecture…";
      try {
        const url = repo ? `/api/board?repo=${encodeURIComponent(repo)}` : "/api/board";
        const b = await fetch(url).then((x) => x.json());
        render(b);
        statusEl.textContent = "à jour · " + new Date().toLocaleTimeString();
      } catch (e) {
        board.innerHTML = `<p class="err">erreur : ${e.message}</p>`;
        statusEl.textContent = "";
      }
    }

    // --- lancement de session (J2) ---
    const typeSel = $("#type"), slugInput = $("#slug"), launchMsg = $("#launchMsg");
    const streamEl = $("#stream"), logEl = $("#log"), streamState = $("#streamState"), streamTitle = $("#streamTitle");
    let es = null;

    async function loadTypes() {
      const r = await fetch("/api/types").then((x) => x.json()).catch(() => ({ types: [] }));
      for (const t of r.types ?? []) {
        const o = document.createElement("option");
        o.value = t.type;
        o.textContent = `${t.skill} (${t.axe})`;
        typeSel.appendChild(o);
      }
    }

    function setState(s) {
      streamState.textContent = s;
      streamState.className = "pill " + s;
    }

    function logEvent(ev) {
      const text = ev.text ?? ev.message ?? ("tool" in ev ? ev.tool : "");
      const cls = ev.kind === "tool_use" ? "tool" : ev.kind === "result" ? "result" : ev.kind === "error" ? "error" : "";
      const div = document.createElement("div");
      div.className = "ev " + cls;
      div.innerHTML = `<span class="k">${ev.kind}</span> ${text ?? ""}`;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function openStream(session) {
      if (es) es.close();
      logEl.innerHTML = "";
      streamTitle.textContent = `${session.type} · ${session.slug}`;
      setState(session.runtime_state || "running");
      streamEl.classList.add("open");
      es = new EventSource(`/api/sessions/${session.id}/events`);
      es.onmessage = (m) => {
        const ev = JSON.parse(m.data);
        logEvent(ev);
        if (ev.kind === "result") setState("done");
        if (ev.kind === "error") setState("error");
      };
      es.addEventListener("end", (m) => {
        setState(m.data);
        es.close();
        loadBoard(); // l'artefact a pu apparaître
      });
    }

    $("#launch").addEventListener("click", async () => {
      const repo = repoSel.value, type = typeSel.value, slug = slugInput.value.trim();
      if (!slug) { launchMsg.textContent = "slug requis"; return; }
      launchMsg.textContent = "lancement…";
      try {
        const r = await fetch("/api/sessions", {
          method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify({ repo, type, slug }),
        });
        const data = await r.json();
        if (!r.ok) { launchMsg.textContent = "✗ " + (data.error ?? r.status); return; }
        launchMsg.textContent = "";
        openStream(data.session);
      } catch (e) { launchMsg.textContent = "✗ " + e.message; }
    });
    $("#closeStream").addEventListener("click", () => { es?.close(); streamEl.classList.remove("open"); });

    $("#refresh").addEventListener("click", loadBoard);
    repoSel.addEventListener("change", loadBoard);
    await loadTypes();
    await loadRepos();
    await loadBoard();
  </script>
</body>
</html>
